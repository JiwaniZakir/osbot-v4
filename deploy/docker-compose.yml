services:
  osbot:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: osbot-v4
    restart: unless-stopped
    # Give the orchestrator up to 60s to finish the current cycle on SIGTERM.
    # Signal handlers in src/osbot/orchestrator/loop.py set a shutdown flag,
    # finish in-flight work, flush state.json + SQLite WAL, then exit cleanly.
    stop_grace_period: 60s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 512M
    volumes:
      - claude-credentials:/home/botuser/.claude
      - gh-config:/home/botuser/.config/gh
      - osbot-v4-state:/opt/osbot/state
    env_file:
      - .env
    environment:
      - PYTHONPATH=/opt/osbot/src
      - HOME=/home/botuser
      - OSBOT_GITHUB_USERNAME=JiwaniZakir
      - OSBOT_STATE_DIR=/opt/osbot/state
      - OSBOT_WORKSPACES_DIR=/opt/osbot/workspaces
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  claude-credentials:
    external: true
    name: deploy_claude-creds
  gh-config:
    external: true
    name: deploy_gh-config
  osbot-v4-state:
    # State volume — SQLite memory.db, state.json, traces/corrections JSONL.
    # Marked external so `docker compose down -v` cannot destroy it.
    # Bootstrap on a new host: `docker volume create deploy_osbot-v4-state`.
    external: true
    name: deploy_osbot-v4-state
