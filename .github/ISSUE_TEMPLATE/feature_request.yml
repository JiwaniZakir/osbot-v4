name: Feature Request
description: Propose a new capability for the bot
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      placeholder: What problem does this solve for the bot's merge rate?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: dropdown
    id: impact
    attributes:
      label: Expected merge rate impact
      options:
        - High (directly improves merge rate)
        - Medium (improves reliability/efficiency)
        - Low (quality of life)
