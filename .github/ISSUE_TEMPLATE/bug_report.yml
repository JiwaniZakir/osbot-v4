name: Bug Report
description: Report a bot malfunction or unexpected behavior
labels: ["bug", "needs-triage"]
body:
  - type: dropdown
    id: phase
    attributes:
      label: Bot Phase
      options:
        - discover
        - contribute
        - review/iterate
        - learn
        - orchestrator
        - tokens
        - other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the unexpected behavior
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened instead?

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      render: shell
