name: Stale Issues

on:
  schedule:
    - cron: "0 8 * * *"

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          stale-issue-message: "This issue has been inactive for 60 days. It will be closed in 14 days unless there is activity."
          close-issue-message: "Closed due to inactivity."
          days-before-stale: 60
          days-before-close: 14
          exempt-issue-labels: "pinned,blocked,priority: high"
          stale-pr-message: ""
          days-before-pr-stale: -1
          days-before-pr-close: -1
